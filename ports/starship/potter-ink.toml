"$schema" = 'https://starship.rs/config-schema.json'

# Potter Ink — Starship. AUTO-GENERATED by Quills.
# Install: copy this file to ~/.config/starship.toml (or merge the
# [palettes.potter] block + `palette = "potter"` into your existing config).
# Symbols use Nerd Font glyphs — pick a Nerd Font in your terminal.

palette = "potter"

# ── Potter palette ──────────────────────────────────────────────────────────
# Every Potter color name, plus standard ANSI aliases so default-styled
# modules pick up the theme automatically.
[palettes.potter]
rosewater = "#ead0c1"
flamingo = "#e5bba8"
pink = "#dcaab2"
mauve = "#c4a5ca"
red = "#d87d70"
maroon = "#d19181"
peach = "#e28c6c"
yellow = "#e2b45c"
green = "#9eb27f"
teal = "#86b5a6"
sky = "#91bcc6"
sapphire = "#81b0c2"
blue = "#8ca8ca"
lavender = "#b5b2d6"
text = "#e9e6e0"
subtext1 = "#bdb6ab"
subtext0 = "#9a9389"
overlay2 = "#7c766c"
overlay1 = "#635e55"
overlay0 = "#494540"
surface2 = "#2a2723"
surface1 = "#1f1d1a"
surface0 = "#161412"
base = "#060605"
mantle = "#030302"
crust = "#000000"
purple = "#c4a5ca"
cyan = "#86b5a6"
white = "#e9e6e0"
black = "#060605"
bright-black = "#635e55"
bright-white = "#bdb6ab"

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold peach)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Directory & VCS ──────────────────────────────────────────────────────────
[directory]
style = "bold blue"
read_only = " 🔒"
read_only_style = "red"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "yellow"

[git_state]
style = "bold maroon"

[hostname]
style = "bold teal"

[username]
style = "bold peach"
style_root = "bold red"

[cmd_duration]
style = "subtext0"
format = "[ $duration]($style)"

[time]
disabled = true
style = "overlay1"

[jobs]
style = "lavender"

[memory_usage]
style = "subtext1"

# ── Language & tooling modules ───────────────────────────────────────────────
[python]
symbol = " "
style = "yellow"

[nodejs]
symbol = " "
style = "green"

[rust]
symbol = " "
style = "peach"

[golang]
symbol = " "
style = "sky"

[lua]
style = "sapphire"

[docker_context]
symbol = " "
style = "sapphire"

[package]
symbol = " "
style = "flamingo"

[c]
style = "subtext1"

[nix_shell]
symbol = " "
style = "sky"
