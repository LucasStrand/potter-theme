<!doctype html>
<html lang="en" data-potter-flavor="quill">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Potter — paper &amp; ink</title>
    <!-- the generated CSS port: defines --potter-* for every flavor -->
    <link rel="stylesheet" href="../ports/css/dist/potter.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--potter-base);
        color: var(--potter-text);
        transition: background 0.2s, color 0.2s;
      }
      header {
        padding: 40px 32px 24px;
        background: var(--potter-mantle);
        border-bottom: 1px solid var(--potter-surface0);
      }
      h1 { margin: 0; font-family: ui-serif, Georgia, serif; font-weight: 600; }
      h1 .dot { color: var(--potter-peach); }
      .sub { color: var(--potter-subtext0); font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; }
      main { padding: 28px 32px 64px; max-width: 980px; margin: 0 auto; }
      .switch { display: flex; gap: 8px; margin: 18px 0 28px; }
      .switch button {
        font: inherit; font-size: 13px; cursor: pointer;
        padding: 7px 14px; border-radius: 999px;
        border: 1px solid var(--potter-surface1);
        background: var(--potter-surface0); color: var(--potter-subtext1);
      }
      .switch button[aria-pressed="true"] {
        background: var(--potter-peach); color: var(--potter-base); border-color: var(--potter-peach);
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
      .swatch { border-radius: 10px; overflow: hidden; border: 1px solid var(--potter-surface0); background: var(--potter-mantle); }
      .swatch .chip { height: 54px; }
      .swatch .meta { padding: 7px 9px; font-family: ui-monospace, monospace; font-size: 11px; }
      .swatch .name { color: var(--potter-text); }
      .swatch .hex { color: var(--potter-subtext0); }
      h2 { font-family: ui-serif, Georgia, serif; font-weight: 600; margin: 34px 0 12px; }
      pre {
        background: var(--potter-mantle); border: 1px solid var(--potter-surface0);
        border-radius: 12px; padding: 16px 18px; overflow-x: auto;
        font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.6;
      }
      .c-comment { color: var(--potter-overlay1); font-style: italic; }
      .c-kw { color: var(--potter-mauve); }
      .c-fn { color: var(--potter-blue); }
      .c-str { color: var(--potter-green); }
      .c-num { color: var(--potter-peach); }
      .c-type { color: var(--potter-yellow); }
      .c-prop { color: var(--potter-sapphire); }
      .c-op { color: var(--potter-sky); }
      .card { background: var(--potter-surface0); border: 1px solid var(--potter-surface1); border-radius: 12px; padding: 16px 18px; margin-top: 12px; }
      .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-family: ui-monospace, monospace; }
      .pill.err { background: color-mix(in srgb, var(--potter-red) 18%, transparent); color: var(--potter-red); }
      .pill.warn { background: color-mix(in srgb, var(--potter-yellow) 20%, transparent); color: var(--potter-yellow); }
      .pill.ok { background: color-mix(in srgb, var(--potter-green) 20%, transparent); color: var(--potter-green); }
    </style>
  </head>
  <body>
    <header>
      <h1>Potter<span class="dot">.</span></h1>
      <div class="sub">paper &amp; ink — parchment · quill · ink</div>
    </header>
    <main>
      <div class="switch" id="switch">
        <button data-flavor="parchment">Parchment</button>
        <button data-flavor="quill" aria-pressed="true">Quill</button>
        <button data-flavor="ink">Ink</button>
      </div>

      <h2>Syntax</h2>
      <pre><span class="c-comment">// a quill writes in three inks</span>
<span class="c-kw">export function</span> <span class="c-fn">brew</span>(<span class="c-prop">flavor</span>: <span class="c-type">Flavor</span>) <span class="c-op">=&gt;</span> {
  <span class="c-kw">const</span> <span class="c-prop">accent</span> <span class="c-op">=</span> <span class="c-str">"#d97757"</span>;
  <span class="c-kw">return</span> { <span class="c-prop">flavor</span>, <span class="c-prop">accent</span>, <span class="c-prop">steeped</span>: <span class="c-num">3</span> };
}</pre>

      <div class="card">
        <span class="pill ok">success</span>
        <span class="pill warn">warning</span>
        <span class="pill err">error</span>
      </div>

      <h2>Palette</h2>
      <div class="grid" id="grid"></div>
    </main>

    <script>
      const NAMES = [
        "rosewater","flamingo","pink","mauve","red","maroon","peach","yellow",
        "green","teal","sky","sapphire","blue","lavender",
        "text","subtext1","subtext0","overlay2","overlay1","overlay0",
        "surface2","surface1","surface0","base","mantle","crust",
      ];
      const grid = document.getElementById("grid");
      function render() {
        const cs = getComputedStyle(document.documentElement);
        grid.innerHTML = NAMES.map((n) => {
          const hex = cs.getPropertyValue("--potter-" + n).trim();
          return `<div class="swatch"><div class="chip" style="background:var(--potter-${n})"></div>` +
                 `<div class="meta"><div class="name">${n}</div><div class="hex">${hex}</div></div></div>`;
        }).join("");
      }
      document.getElementById("switch").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        document.documentElement.setAttribute("data-potter-flavor", b.dataset.flavor);
        for (const btn of document.querySelectorAll("#switch button"))
          btn.setAttribute("aria-pressed", String(btn === b));
        render();
      });
      render();
    </script>
  </body>
</html>
