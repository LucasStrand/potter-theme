"$schema" = 'https://starship.rs/config-schema.json'

# Potter Quill — Starship. AUTO-GENERATED by Quills.
# Install: copy this file to ~/.config/starship.toml (or merge the
# [palettes.potter] block + `palette = "potter"` into your existing config).
# Symbols use Nerd Font glyphs — pick a Nerd Font in your terminal.

palette = "potter"

# ── Potter palette ──────────────────────────────────────────────────────────
# Every Potter color name, plus standard ANSI aliases so default-styled
# modules pick up the theme automatically.
[palettes.potter]
rosewater = "#e8cfc0"
flamingo = "#e3b9a6"
pink = "#dba8b0"
mauve = "#c2a3c8"
red = "#d77b6e"
maroon = "#cf8f7f"
peach = "#e08a6a"
yellow = "#e0b25a"
green = "#9cb07d"
teal = "#84b3a4"
sky = "#8fbac4"
sapphire = "#7faec0"
blue = "#8aa6c8"
lavender = "#b3b0d4"
text = "#efe9df"
subtext1 = "#c8bca4"
subtext0 = "#a99e8d"
overlay2 = "#8f7f64"
overlay1 = "#786850"
overlay0 = "#5b4e3a"
surface2 = "#453829"
surface1 = "#362c20"
surface0 = "#2a2218"
base = "#1c1812"
mantle = "#17140f"
crust = "#120f0a"
purple = "#c2a3c8"
cyan = "#84b3a4"
white = "#efe9df"
black = "#1c1812"
bright-black = "#786850"
bright-white = "#c8bca4"

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold peach)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Directory & VCS ──────────────────────────────────────────────────────────
[directory]
style = "bold blue"
read_only = " 🔒"
read_only_style = "red"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "yellow"

[git_state]
style = "bold maroon"

[hostname]
style = "bold teal"

[username]
style = "bold peach"
style_root = "bold red"

[cmd_duration]
style = "subtext0"
format = "[ $duration]($style)"

[time]
disabled = true
style = "overlay1"

[jobs]
style = "lavender"

[memory_usage]
style = "subtext1"

# ── Language & tooling modules ───────────────────────────────────────────────
[python]
symbol = " "
style = "yellow"

[nodejs]
symbol = " "
style = "green"

[rust]
symbol = " "
style = "peach"

[golang]
symbol = " "
style = "sky"

[lua]
style = "sapphire"

[docker_context]
symbol = " "
style = "sapphire"

[package]
symbol = " "
style = "flamingo"

[c]
style = "subtext1"

[nix_shell]
symbol = " "
style = "sky"
