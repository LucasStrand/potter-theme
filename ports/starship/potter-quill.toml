"$schema" = 'https://starship.rs/config-schema.json'

# Potter Quill — Starship. AUTO-GENERATED by Quills.
# Powerline prompt — use a Nerd Font in your terminal so the    caps render.
# Only the palette differs from the upstream Gruvbox-Rainbow layout.
palette = "potter"
format = """
[](mauve)\
$os\
$username\
[](bg:pink fg:mauve)\
$directory\
[](fg:pink bg:peach)\
$git_branch\
$git_status\
[](fg:peach bg:sky)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[](fg:sky bg:teal)\
$docker_context\
[](fg:teal bg:blue)\
$time\
[ ](fg:blue)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:base bg:mauve"
style_root = "fg:base bg:mauve"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:base bg:mauve"
disabled = true # Disabled by default

[directory]
style = "fg:base bg:pink"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:base bg:teal"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:base bg:peach"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:base bg:peach"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:base bg:blue"
format = '[ ♥ $time ]($style)'

# ── Potter Quill palette ──────────────────────────────────────────────────
[palettes.potter]
rosewater = "#e8cfc0"
flamingo = "#e3b9a6"
pink = "#dba8b0"
mauve = "#c2a3c8"
red = "#d77b6e"
maroon = "#cf8f7f"
peach = "#e08a6a"
yellow = "#e0b25a"
green = "#9cb07d"
teal = "#84b3a4"
sky = "#8fbac4"
sapphire = "#7faec0"
blue = "#8aa6c8"
lavender = "#b3b0d4"
text = "#efe9df"
subtext1 = "#c8bca4"
subtext0 = "#a99e8d"
overlay2 = "#8f7f64"
overlay1 = "#786850"
overlay0 = "#5b4e3a"
surface2 = "#453829"
surface1 = "#362c20"
surface0 = "#2a2218"
base = "#1c1812"
mantle = "#17140f"
crust = "#120f0a"
