"$schema" = 'https://starship.rs/config-schema.json'

# Potter Parchment — Starship. AUTO-GENERATED by Quills.
# Install: copy to ~/.config/starship.toml (or point $STARSHIP_CONFIG at it).
# A powerline prompt — use a Nerd Font in your terminal so the    caps render.
# All segment colors come from [palettes.potter] at the bottom of this file.
palette = "potter"

format = """
[](mauve)\
$os\
$username\
[](bg:pink fg:mauve)\
$directory\
[](fg:pink bg:peach)\
$git_branch\
$git_status\
[](fg:peach bg:sky)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[](fg:sky bg:teal)\
$docker_context\
[](fg:teal bg:blue)\
$time\
[ ](fg:blue)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

[username]
show_always = true
style_user = "fg:base bg:mauve"
style_root = "fg:base bg:mauve"
format = '[$user ]($style)'
disabled = false

# Symbol representing the current OS (disabled by default; uses the user segment)
[os]
style = "fg:base bg:mauve"
disabled = true

[directory]
style = "fg:base bg:pink"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[c]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:base bg:teal"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:base bg:peach"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:base bg:peach"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:base bg:blue"
format = '[ ♥ $time ]($style)'

# ── Potter Parchment palette ──────────────────────────────────────────────────
[palettes.potter]
rosewater = "#ba8169"
flamingo = "#bf8069"
pink = "#c06b7a"
mauve = "#9a6aa0"
red = "#b02619"
maroon = "#b5544a"
peach = "#d77250"
yellow = "#bd8324"
green = "#788c5d"
teal = "#4f8a78"
sky = "#5a93a3"
sapphire = "#4f86a0"
blue = "#4a6da0"
lavender = "#6f6aa8"
text = "#141413"
subtext1 = "#6b6357"
subtext0 = "#897f6d"
overlay2 = "#a89e8c"
overlay1 = "#b0a48c"
overlay0 = "#c3b7a0"
surface2 = "#d6cab4"
surface1 = "#e3dacc"
surface0 = "#ece6da"
base = "#faf9f5"
mantle = "#f2eee4"
crust = "#e9e1d1"
