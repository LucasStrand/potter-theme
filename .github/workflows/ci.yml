name: ci
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build palette
        run: node palette/src/build.ts
      - name: Check generated ports are up to date
        run: node generator/src/cli.ts --check
      - name: Tests
        run: node --test
      - name: Contrast gate
        run: node scripts/check-contrast.ts
