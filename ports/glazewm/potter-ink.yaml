# Potter Ink — GlazeWM. AUTO-GENERATED by Quills.
# GlazeWM (https://github.com/glzr-io/glazewm) has no theme-include mechanism,
# so copy this `window_effects` block into your config.yaml (replacing the
# existing one). The focused border is Potter peach (#e28c6c); unfocused
# windows get a muted overlay so the active window stays obvious.
window_effects:
  focused_window:
    border:
      enabled: true
      color: "#e28c6c"
  other_windows:
    border:
      enabled: true
      color: "#494540"
