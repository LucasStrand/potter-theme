"$schema" = 'https://starship.rs/config-schema.json'

# Potter Parchment — Starship. AUTO-GENERATED by Quills.
# Install: copy this file to ~/.config/starship.toml (or merge the
# [palettes.potter] block + `palette = "potter"` into your existing config).
# Symbols use Nerd Font glyphs — pick a Nerd Font in your terminal.

palette = "potter"

# ── Potter palette ──────────────────────────────────────────────────────────
# Every Potter color name, plus standard ANSI aliases so default-styled
# modules pick up the theme automatically.
[palettes.potter]
rosewater = "#ba8169"
flamingo = "#bf8069"
pink = "#c06b7a"
mauve = "#9a6aa0"
red = "#b02619"
maroon = "#b5544a"
peach = "#d77250"
yellow = "#bd8324"
green = "#788c5d"
teal = "#4f8a78"
sky = "#5a93a3"
sapphire = "#4f86a0"
blue = "#4a6da0"
lavender = "#6f6aa8"
text = "#141413"
subtext1 = "#6b6357"
subtext0 = "#897f6d"
overlay2 = "#a89e8c"
overlay1 = "#b0a48c"
overlay0 = "#c3b7a0"
surface2 = "#d6cab4"
surface1 = "#e3dacc"
surface0 = "#ece6da"
base = "#faf9f5"
mantle = "#f2eee4"
crust = "#e9e1d1"
purple = "#9a6aa0"
cyan = "#4f8a78"
white = "#141413"
black = "#faf9f5"
bright-black = "#b0a48c"
bright-white = "#6b6357"

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold peach)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Directory & VCS ──────────────────────────────────────────────────────────
[directory]
style = "bold blue"
read_only = " 🔒"
read_only_style = "red"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "yellow"

[git_state]
style = "bold maroon"

[hostname]
style = "bold teal"

[username]
style = "bold peach"
style_root = "bold red"

[cmd_duration]
style = "subtext0"
format = "[ $duration]($style)"

[time]
disabled = true
style = "overlay1"

[jobs]
style = "lavender"

[memory_usage]
style = "subtext1"

# ── Language & tooling modules ───────────────────────────────────────────────
[python]
symbol = " "
style = "yellow"

[nodejs]
symbol = " "
style = "green"

[rust]
symbol = " "
style = "peach"

[golang]
symbol = " "
style = "sky"

[lua]
style = "sapphire"

[docker_context]
symbol = " "
style = "sapphire"

[package]
symbol = " "
style = "flamingo"

[c]
style = "subtext1"

[nix_shell]
symbol = " "
style = "sky"
