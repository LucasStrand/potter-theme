"$schema" = 'https://starship.rs/config-schema.json'

# Potter Ink — Starship. AUTO-GENERATED by Quills.
# Powerline prompt — use a Nerd Font in your terminal so the    caps render.
# Only the palette differs from the upstream Gruvbox-Rainbow layout.
palette = "potter"
format = """
[](mauve)\
$os\
$username\
[](bg:pink fg:mauve)\
$directory\
[](fg:pink bg:peach)\
$git_branch\
$git_status\
[](fg:peach bg:sky)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[](fg:sky bg:teal)\
$docker_context\
[](fg:teal bg:blue)\
$time\
[ ](fg:blue)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:base bg:mauve"
style_root = "fg:base bg:mauve"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:base bg:mauve"
disabled = true # Disabled by default

[directory]
style = "fg:base bg:pink"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:base bg:teal"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:base bg:peach"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:base bg:peach"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:base bg:sky"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:base bg:blue"
format = '[ ♥ $time ]($style)'

# ── Potter Ink palette ──────────────────────────────────────────────────
[palettes.potter]
rosewater = "#ead0c1"
flamingo = "#e5bba8"
pink = "#dcaab2"
mauve = "#c4a5ca"
red = "#d87d70"
maroon = "#d19181"
peach = "#e28c6c"
yellow = "#e2b45c"
green = "#9eb27f"
teal = "#86b5a6"
sky = "#91bcc6"
sapphire = "#81b0c2"
blue = "#8ca8ca"
lavender = "#b5b2d6"
text = "#e9e6e0"
subtext1 = "#bdb6ab"
subtext0 = "#9a9389"
overlay2 = "#7c766c"
overlay1 = "#635e55"
overlay0 = "#494540"
surface2 = "#2a2723"
surface1 = "#1f1d1a"
surface0 = "#161412"
base = "#060605"
mantle = "#030302"
crust = "#000000"
